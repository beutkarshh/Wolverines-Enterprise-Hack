<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Dekho - Inbound Call System</title>
  <style>
    :root {
      --bg: #0a0e27;
      --surface: #131836;
      --surface2: #1a2040;
      --border: #2a3458;
      --accent: #00e5a0;
      --text: #e0e7ff;
      --muted: #8b92c0;
      --danger: #ff4567;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
      padding: 20px;
      background: linear-gradient(135deg, rgba(0,229,160,0.1) 0%, rgba(99,102,241,0.1) 100%);
      border-radius: 15px;
      border: 1px solid var(--border);
    }

    header h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--accent) 0%, #6366f1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--muted);
      font-size: 1rem;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 20px;
      margin-bottom: 30px;
    }

    .chat-container {
      background: var(--surface);
      border-radius: 15px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 700px;
    }

    .chat-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-info h3 {
      font-size: 1.1rem;
      margin-bottom: 5px;
    }

    .chat-status {
      font-size: 0.85rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
    }

    .status-dot.active {
      background: var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .call-controls {
      display: flex;
      gap: 10px;
    }

    button {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-start {
      background: var(--accent);
      color: #000;
    }

    .btn-start:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(0,229,160,0.3);
    }

    .btn-end {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
    }

    .btn-end:hover {
      background: rgba(255,69,103,0.1);
    }

    button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none !important;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 80%;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.agent {
      align-self: flex-start;
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message.system {
      align-self: center;
      max-width: 100%;
    }

    .msg-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      border: 2px solid var(--border);
    }

    .message.agent .msg-avatar {
      background: rgba(0,229,160,0.15);
      border-color: var(--accent);
    }

    .msg-content {
      flex: 1;
    }

    .msg-bubble {
      background: var(--surface2);
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      line-height: 1.6;
    }

    .message.agent .msg-bubble {
      background: rgba(0,229,160,0.08);
      border-color: rgba(0,229,160,0.3);
      border-radius: 4px 12px 12px 12px;
    }

    .message.user .msg-bubble {
      background: rgba(99,102,241,0.15);
      border-color: rgba(99,102,241,0.3);
      border-radius: 12px 4px 12px 12px;
    }

    .message.system .msg-bubble {
      background: rgba(255,255,255,0.05);
      text-align: center;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .msg-meta {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 5px;
    }

    .tool-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(0,229,160,0.15);
      border: 1px solid rgba(0,229,160,0.3);
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      margin-top: 8px;
      margin-right: 5px;
    }

    audio {
      width: 100%;
      margin-top: 10px;
      border-radius: 8px;
    }

    .input-area {
      padding: 20px;
      border-top: 1px solid var(--border);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .msg-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.95rem;
      resize: none;
      min-height: 44px;
      max-height: 100px;
    }

    .msg-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .mic-btn {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .mic-btn.recording {
      background: rgba(255,69,103,0.2);
      color: var(--danger);
      border-color: var(--danger);
      animation: pulse 1.5s infinite;
    }

    .stt-status {
      font-size: 0.85rem;
      color: var(--accent);
      margin-top: 8px;
      min-height: 20px;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .stats-card, .kb-card {
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 20px;
    }

    .stats-card h3, .kb-card h3 {
      font-size: 0.95rem;
      margin-bottom: 15px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .stat-item:last-child {
      border-bottom: none;
    }

    .stat-label {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .stat-value {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent);
    }

    .kb-search {
      width: 100%;
      padding: 10px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
      margin-bottom: 10px;
    }

    .kb-search:focus {
      outline: none;
      border-color: var(--accent);
    }

    .kb-results {
      max-height: 300px;
      overflow-y: auto;
    }

    .kb-item {
      background: var(--surface2);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      border-left: 3px solid var(--accent);
      cursor: pointer;
      transition: all 0.2s;
    }

    .kb-item:hover {
      background: rgba(0,229,160,0.08);
      transform: translateX(5px);
    }

    .kb-category {
      font-size: 0.75rem;
      color: var(--accent);
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .kb-question {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .kb-answer {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.4;
    }

    .thinking {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 12px 16px;
      background: var(--surface2);
      border-radius: 8px;
      width: fit-content;
    }

    .dot-pulse {
      display: flex;
      gap: 4px;
    }

    .dot-pulse span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: dotPulse 1.2s ease-in-out infinite;
    }

    .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
    .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotPulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .lang-selector {
      display: flex;
      gap: 5px;
      margin-top: 10px;
    }

    .lang-btn {
      flex: 1;
      padding: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .lang-btn.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }

    .config-panel {
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 15px;
      margin-bottom: 20px;
    }

    .config-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .config-row input {
      flex: 1;
      padding: 10px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📞 Campus Dekho - Inbound Call System</h1>
      <p>the admission corridor - Voice-Enabled AI Agent</p>
    </header>

    <div class="config-panel">
      <div class="config-row">
        <input type="text" id="callSidInput" placeholder="Call SID (auto-generated)" readonly>
        <input type="tel" id="phoneInput" placeholder="Caller Number (+91...)" value="+919876543210">
      </div>
      <div class="lang-selector">
        <button class="lang-btn active" data-lang="en" onclick="selectLanguage('en')">🇬🇧 English</button>
        <button class="lang-btn" data-lang="hi" onclick="selectLanguage('hi')">🇮🇳 हिंदी</button>
        <button class="lang-btn" data-lang="mr" onclick="selectLanguage('mr')">🇮🇳 मराठी</button>
      </div>
    </div>

    <div class="main-grid">
      <div class="chat-container">
        <div class="chat-header">
          <div class="chat-info">
            <h3>🤖 Priya - AI Assistant</h3>
            <div class="chat-status">
              <span class="status-dot" id="statusDot"></span>
              <span id="statusText">Ready to start</span>
            </div>
          </div>
          <div class="call-controls">
            <button class="btn-start" id="btnStart" onclick="startCall()">▶️ Start Call</button>
            <button class="btn-end" id="btnEnd" onclick="endCall()" disabled>⏹️ End Call</button>
          </div>
        </div>

        <div class="messages" id="messages">
          <div class="message system">
            <div class="msg-content">
              <div class="msg-bubble">
                👋 Click "Start Call" to begin testing the inbound call system
              </div>
            </div>
          </div>
        </div>

        <div class="input-area">
          <div class="input-row">
            <textarea class="msg-input" id="userInput" placeholder="Type your message or click mic to speak..." disabled rows="1"></textarea>
            <button class="mic-btn" id="micBtn" onclick="toggleRecording()" disabled>🎤</button>
            <button class="btn-start" id="sendBtn" onclick="sendMessage()" disabled style="height: 44px;">Send</button>
          </div>
          <div class="stt-status" id="sttStatus"></div>
        </div>
      </div>

      <div class="sidebar">
        <div class="stats-card">
          <h3>📊 System Stats</h3>
          <div class="stat-item">
            <span class="stat-label">FAQs</span>
            <span class="stat-value" id="statFAQs">-</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Packages</span>
            <span class="stat-value" id="statPackages">-</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Events</span>
            <span class="stat-value" id="statEvents">-</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Agents</span>
            <span class="stat-value" id="statAgents">-</span>
          </div>
        </div>

        <div class="kb-card">
          <h3>🔍 Knowledge Base</h3>
          <input type="text" class="kb-search" id="kbSearch" placeholder="Search FAQs..." onkeyup="searchKB(event)">
          <div class="kb-results" id="kbResults">
            <div style="text-align: center; color: var(--muted); padding: 20px; font-size: 0.9rem;">
              Type to search knowledge base
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '';
    const STT_LANG = { en: 'en-IN', hi: 'hi-IN', mr: 'mr-IN' };

    let currentCallSid = null;
    let currentLanguage = 'en';
    let isRecording = false;
    let recognition = null;
    let currentAudio = null;

    // Initialize Speech Recognition
    function initSTT() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) return null;

      recognition = new SR();
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.lang = STT_LANG[currentLanguage];

      recognition.onstart = () => {
        isRecording = true;
        document.getElementById('micBtn').classList.add('recording');
        document.getElementById('sttStatus').textContent = '🎤 Listening...';
      };

      recognition.onresult = (event) => {
        const transcript = Array.from(event.results)
          .map(result => result[0].transcript)
          .join('');

        document.getElementById('userInput').value = transcript;

        if (event.results[0].isFinal) {
          document.getElementById('sttStatus').textContent = '✅ Got it! Click send or say more...';
        } else {
          document.getElementById('sttStatus').textContent = `🎤 ${transcript}`;
        }
      };

      recognition.onend = () => {
        isRecording = false;
        document.getElementById('micBtn').classList.remove('recording');
        if (!document.getElementById('userInput').value) {
          document.getElementById('sttStatus').textContent = '';
        }
      };

      recognition.onerror = (event) => {
        console.error('STT Error:', event.error);
        document.getElementById('sttStatus').textContent = '❌ Error: ' + event.error;
        isRecording = false;
        document.getElementById('micBtn').classList.remove('recording');
      };

      return recognition;
    }

    function toggleRecording() {
      if (!recognition) {
        recognition = initSTT();
        if (!recognition) {
          alert('Speech recognition not supported. Use Chrome, Edge, or Safari.');
          return;
        }
      }

      if (isRecording) {
        recognition.stop();
      } else {
        recognition.lang = STT_LANG[currentLanguage];
        recognition.start();
      }
    }

    function selectLanguage(lang) {
      currentLanguage = lang;
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });

      if (recognition) {
        recognition.lang = STT_LANG[lang];
      }
    }

    function generateCallSid() {
      return `CA${Date.now()}${Math.random().toString(36).substr(2, 9)}`;
    }

    async function startCall() {
      const callSid = generateCallSid();
      const phone = document.getElementById('phoneInput').value;

      currentCallSid = callSid;
      document.getElementById('callSidInput').value = callSid;
      document.getElementById('statusDot').classList.add('active');
      document.getElementById('statusText').textContent = 'Call Active';

      document.getElementById('btnStart').disabled = true;
      document.getElementById('btnEnd').disabled = false;
      document.getElementById('userInput').disabled = false;
      document.getElementById('micBtn').disabled = false;
      document.getElementById('sendBtn').disabled = false;

      clearMessages();
      showThinking();

      try {
        const res = await fetch(`${API_BASE}/api/inbound/start`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ callSid, callerNumber: phone }),
        });

        const data = await res.json();
        hideThinking();

        if (data.success) {
          addMessage('agent', data.text, data.audioPath);
        } else {
          addMessage('system', '❌ Failed to start call: ' + (data.error || 'Unknown error'));
        }
      } catch (err) {
        hideThinking();
        addMessage('system', '❌ Error: ' + err.message);
      }
    }

    async function sendMessage() {
      const message = document.getElementById('userInput').value.trim();
      if (!message || !currentCallSid) return;

      addMessage('user', message);
      document.getElementById('userInput').value = '';
      document.getElementById('sttStatus').textContent = '';

      showThinking();

      try {
        const res = await fetch(`${API_BASE}/api/inbound/respond`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            callSid: currentCallSid,
            message,
            language: currentLanguage,
          }),
        });

        const data = await res.json();
        hideThinking();

        if (data.success) {
          addMessage('agent', data.text, data.audioPath, data.toolCalls);

          if (data.needsEscalation) {
            addMessage('system', '⚠️ Escalation triggered: ' + JSON.stringify(data.escalationData));
          }
        } else {
          addMessage('system', '❌ Error: ' + (data.error || 'Unknown error'));
        }
      } catch (err) {
        hideThinking();
        addMessage('system', '❌ Error: ' + err.message);
      }
    }

    async function endCall() {
      if (!currentCallSid) return;

      try {
        const res = await fetch(`${API_BASE}/api/inbound/end`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ callSid: currentCallSid }),
        });

        const data = await res.json();

        if (data.success) {
          addMessage('system', `✅ Call ended. Duration: ${data.duration}s`);
        }
      } catch (err) {
        addMessage('system', '❌ Error ending call: ' + err.message);
      }

      currentCallSid = null;
      document.getElementById('statusDot').classList.remove('active');
      document.getElementById('statusText').textContent = 'Call Ended';

      document.getElementById('btnStart').disabled = false;
      document.getElementById('btnEnd').disabled = true;
      document.getElementById('userInput').disabled = true;
      document.getElementById('micBtn').disabled = true;
      document.getElementById('sendBtn').disabled = true;

      if (recognition && isRecording) {
        recognition.stop();
      }
    }

    function clearMessages() {
      document.getElementById('messages').innerHTML = '';
    }

    function addMessage(role, text, audioPath = null, toolCalls = null) {
      const messagesDiv = document.getElementById('messages');
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${role}`;

      const avatar = role === 'agent' ? '🤖' : role === 'user' ? '👤' : '⚙️';
      const roleName = role === 'agent' ? 'Priya' : role === 'user' ? 'You' : 'System';

      let toolBadges = '';
      if (toolCalls && toolCalls.length > 0) {
        toolBadges = '<div>' + toolCalls.map(tc =>
          `<span class="tool-badge">🔧 ${tc.name}</span>`
        ).join('') + '</div>';
      }

      msgDiv.innerHTML = `
        ${role !== 'system' ? `<div class="msg-avatar">${avatar}</div>` : ''}
        <div class="msg-content">
          <div class="msg-bubble">
            ${text}
            ${audioPath ? `<audio controls src="${audioPath}" autoplay></audio>` : ''}
            ${toolBadges}
          </div>
          ${role !== 'system' ? `<div class="msg-meta">${roleName} • ${new Date().toLocaleTimeString()}</div>` : ''}
        </div>
      `;

      messagesDiv.appendChild(msgDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;

      // Stop previous audio
      if (currentAudio) currentAudio.pause();
      if (audioPath) {
        const audioEl = msgDiv.querySelector('audio');
        if (audioEl) currentAudio = audioEl;
      }
    }

    function showThinking() {
      const messagesDiv = document.getElementById('messages');
      const thinkingDiv = document.createElement('div');
      thinkingDiv.id = 'thinking';
      thinkingDiv.className = 'thinking';
      thinkingDiv.innerHTML = `
        <span>Priya is thinking</span>
        <div class="dot-pulse">
          <span></span><span></span><span></span>
        </div>
      `;
      messagesDiv.appendChild(thinkingDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function hideThinking() {
      const thinking = document.getElementById('thinking');
      if (thinking) thinking.remove();
    }

    async function loadStats() {
      try {
        const res = await fetch(`${API_BASE}/api/inbound/knowledge/stats`);
        const data = await res.json();

        if (data.success) {
          document.getElementById('statFAQs').textContent = data.stats.totalFAQs;
          document.getElementById('statPackages').textContent = data.stats.totalPackages;
          document.getElementById('statEvents').textContent = data.stats.totalEvents;
          document.getElementById('statAgents').textContent = data.stats.totalAgents;
        }
      } catch (err) {
        console.error('Failed to load stats:', err);
      }
    }

    async function searchKB(event) {
      if (event && event.key !== 'Enter' && event.type === 'keyup' && event.target.value.length < 2) {
        return;
      }

      const query = document.getElementById('kbSearch').value.trim();
      const resultsDiv = document.getElementById('kbResults');

      if (!query) {
        resultsDiv.innerHTML = '<div style="text-align: center; color: var(--muted); padding: 20px; font-size: 0.9rem;">Type to search knowledge base</div>';
        return;
      }

      resultsDiv.innerHTML = '<div style="text-align: center; color: var(--muted); padding: 20px;">Searching...</div>';

      try {
        const res = await fetch(`${API_BASE}/api/inbound/knowledge/search?q=${encodeURIComponent(query)}`);
        const data = await res.json();

        if (data.success && data.results.length > 0) {
          resultsDiv.innerHTML = data.results.map(item => `
            <div class="kb-item" onclick="useKBAnswer('${item.question.replace(/'/g, "\\'")}')">
              <div class="kb-category">${item.category}</div>
              <div class="kb-question">${item.question}</div>
              <div class="kb-answer">${item.answer.substring(0, 100)}...</div>
            </div>
          `).join('');
        } else {
          resultsDiv.innerHTML = '<div style="text-align: center; color: var(--muted); padding: 20px; font-size: 0.9rem;">No results found</div>';
        }
      } catch (err) {
        resultsDiv.innerHTML = '<div style="text-align: center; color: var(--danger); padding: 20px; font-size: 0.9rem;">Error: ' + err.message + '</div>';
      }
    }

    function useKBAnswer(question) {
      if (currentCallSid && !document.getElementById('userInput').disabled) {
        document.getElementById('userInput').value = question;
        document.getElementById('userInput').focus();
      }
    }

    // Enter key sends message
    document.getElementById('userInput')?.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Initialize
    loadStats();
    initSTT();
  </script>
</body>
</html>
